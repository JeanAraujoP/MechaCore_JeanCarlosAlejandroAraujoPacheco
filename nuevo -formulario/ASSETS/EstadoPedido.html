<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MechaCore - Estado Pedido</title>
    <link rel="stylesheet" href="/CSS/styles6.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css ">
</head>
<body>
    <div class="container">
        <!-- Panel Izquierdo -->
        <div class="left-panel">
            <div class="brand">
                <div class="logo">
                    <i class="fas fa-microchip"></i>
                </div>
                <h1 class="brand-name">MechaCore</h1>
                <p class="brand-tagline">Tu tienda virtual de tecnología mecánica</p>
            </div>

            <div class="hero-image">
                <img src="/img/Logo.jpg" alt="Robot mecánico">
            </div>

            <div class="features">
                <div class="feature-card">
                    <div class="feature-icon">
                        <i class="fas fa-robot"></i>
                    </div>
                    <span class="feature-text">Tecnología<br>Avanzada</span>
                </div>
                <div class="feature-card">
                    <div class="feature-icon">
                        <i class="fas fa-cog"></i>
                    </div>
                    <span class="feature-text">Componentes<br>Premium</span>
                </div>
                <div class="feature-card">
                    <div class="feature-icon">
                        <i class="fas fa-bolt"></i>
                    </div>
                    <span class="feature-text">Envío Rápido</span>
                </div>
            </div>
        </div>

        <!-- Panel Derecho -->
        <div class="right-panel">
            <div class="form-container">
                <h2 class="form-title">Formulario Estado Pedido</h2>
                <p class="form-subtitle">Únete a la revolución tecnológica</p>

<form id="registerForm" novalidate>

                    <div class="form-group">
                        <label for="documentType">Tipo de documento</label>
                        <div class="input-wrapper">
                            <i class="fas fa-id-card input-icon"></i>
                            <select id="producto" onchange="mostrarProducto()">
                                <option value="" disabled selected>Seleccione tipo de documento</option>
                                <option value="">-- Seleccione --</option>
                                <option value="arduino">Arduino Uno</option>
                                <option value="sensor">Sensor Ultrasónico HC-SR04</option>
                                <option value="motor">Motor Servo SG90</option>

                            </select>
                            <i class="fas fa-chevron-down select-arrow"></i>
                        </div>
                        <span class="error-message" id="documentTypeError"></span>
                    </div>

<div class="form-group">
    <label>Descripcion Detallada</label>
    <div class="input-wrapper">
        <i class="fas fa-warehouse input-icon"></i>
        <input type="text" id="descripcion" placeholder="Descripcion del producto" readonly>
    </div>
</div>

<div class="form-group">
    <label>Aplicaciones</label>
    <div class="input-wrapper">
        <i class="fas fa-boxes input-icon"></i>
        <input type="text" id="aplicaciones" placeholder="Aplicaciones del producto" readonly>
    </div>
</div>

<div class="form-group">
    <label>URL Imagen</label>
    <div class="input-wrapper">
        <i class="fas fa-image input-icon"></i>
        <input type="text" id="urlimagen" readonly>
    </div>
</div>

<div class="form-group">
    <label>URL Pinout</label>
    <div class="input-wrapper">
        <i class="fas fa-project-diagram input-icon"></i>
        <input type="text" id="urlpinout" readonly>
    </div>
</div>

    <!-- Términos -->
    <div class="form-group terms">
        <label class="checkbox-wrapper">
            <input type="checkbox" id="terms" required>
            <span class="checkmark"></span>
            <span class="terms-text">
                Acepto los <a href="#" class="terms-link">términos y condiciones</a>
            </span>
        </label>
    </div>

    <!-- Botón -->
    <button type="button" class="btn-register" onclick="actualizarInventario()">
        <a class="btn-text" href="/ASSETS/EstadoUsuario.html">Registrarse</a>
        <i class="fas fa-arrow-right btn-icon"></i>
    </button>

</form>

<p class="login-link">
    ¿Ya tienes cuenta? <a href="#">Inicia sesión</a>
</p>

            </div>
        </div>

    <script src="/JS/estadopedido.js"></script>
</body>
</html>
