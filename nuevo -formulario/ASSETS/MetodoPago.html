<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MechaCore - Formulario Metodo de Pago</title>
    <link rel="stylesheet" href="/CSS/styles6.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css ">
</head>
<body>
    <div class="container">
        <!-- Panel Izquierdo -->
        <div class="left-panel">
            <div class="brand">
                <div class="logo">
                    <i class="fas fa-microchip"></i>
                </div>
                <h1 class="brand-name">MechaCore</h1>
                <p class="brand-tagline">Tu tienda virtual de tecnología mecánica</p>
            </div>

            <div class="hero-image">
                <img src="/img/Logo.jpg" alt="Robot mecánico">
            </div>

            <div class="features">
                <div class="feature-card">
                    <div class="feature-icon">
                        <i class="fas fa-robot"></i>
                    </div>
                    <span class="feature-text">Tecnología<br>Avanzada</span>
                </div>
                <div class="feature-card">
                    <div class="feature-icon">
                        <i class="fas fa-cog"></i>
                    </div>
                    <span class="feature-text">Componentes<br>Premium</span>
                </div>
                <div class="feature-card">
                    <div class="feature-icon">
                        <i class="fas fa-bolt"></i>
                    </div>
                    <span class="feature-text">Envío Rápido</span>
                </div>
            </div>
        </div>

        <!-- Panel Derecho -->
        <div class="right-panel">
            <div class="form-container">
                <h2 class="form-title">Formulario Metodo de Pago</h2>
                <p class="form-subtitle">Únete a la revolución tecnológica</p>


                    <!-- Metodo Pago - NUEVO -->
                    <div class="form-group">
                        <label for="documentType">Metodos de Pago</label>
                        <div class="input-wrapper">
                            <i class="fas fa-id-card input-icon"></i>
                            <select id="documentType" name="documentType" required>
                                <option value="" disabled selected>Seleccione Su Metodo De Pago</option>
                                <option value="ce">Tarjeta de Crédito</option>
                                <option value="ce">Tarjeta de Débito</option>
                                <option value="ce">PayPal</option>
                                <option value="ce">nu bank</option>
                                <option value="ce">Daviplata</option>
                                <option value="ce">Nequi</option>
                            </select>
                            <i class="fas fa-chevron-down select-arrow"></i>
                        </div>
                        <span class="error-message" id="documentTypeError"></span>
                    </div>

                    <!-- Términos y condiciones -->
                    <div class="form-group terms">
                        <label class="checkbox-wrapper">
                            <input type="checkbox" id="terms" name="terms" required>
                            <span class="checkmark"></span>
                            <span class="terms-text">
                                Acepto los <a href="#" class="terms-link">términos y condiciones</a>
                            </span>
                        </label>
                        <span class="error-message" id="termsError"></span>
                    </div>

                    <!-- Botón de registro -->
                    <button type="submit" class="btn-register">
                        <a class="btn-text" href="/ASSETS/Pago.html">Registrarse</a>
                        <i class="fas fa-arrow-right btn-icon"></i>
                        <div class="spinner hidden"></div>
                    </button>
                </form>

                <p class="login-link">
                    ¿Ya tienes cuenta? <a href="#">Inicia sesión</a>
                </p>
            </div>
        </div>
    </div>

    <!-- Toast de notificación -->
    <div id="toast" class="toast hidden">
        <i class="fas fa-check-circle toast-icon"></i>
    </div>

    <script src="/JS/metodopago.js"></script>
</body>
</html>
