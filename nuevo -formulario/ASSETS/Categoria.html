<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MechaCore - Formulario Categoria</title>
<link rel="stylesheet" href="/CSS/styles6.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <div class="container">
        <!-- Panel Izquierdo -->
        <div class="left-panel">
            <div class="brand">
                <div class="logo">
                    <i class="fas fa-microchip"></i>
                </div>
                <h1 class="brand-name">MechaCore</h1>
                <p class="brand-tagline">Tu tienda virtual de tecnología mecánica</p>
            </div>

            <div class="hero-image">
                <img src="/img/Logo.jpg" alt="Robot mecánico">
            </div>

            <div class="features">
                <div class="feature-card">
                    <div class="feature-icon">
                        <i class="fas fa-robot"></i>
                    </div>
                    <span class="feature-text">Tecnología<br>Avanzada</span>
                </div>
                <div class="feature-card">
                    <div class="feature-icon">
                        <i class="fas fa-cog"></i>
                    </div>
                    <span class="feature-text">Componentes<br>Premium</span>
                </div>
                <div class="feature-card">
                    <div class="feature-icon">
                        <i class="fas fa-bolt"></i>
                    </div>
                    <span class="feature-text">Envío Rápido</span>
                </div>
            </div>
        </div>

<!-- Panel Derecho -->
<div class="right-panel">

<div class="form-container">

<h2 class="form-title">Formulario Categoria</h2>
<p class="form-subtitle">Únete a la revolución tecnológica</p>

<form>

<!-- CATEGORIA -->
<div class="form-group">
<label>Categoria</label>

<div class="input-wrapper">

<i class="fas fa-layer-group input-icon"></i>

<select id="categoria" onchange="mostrarProductos()">

<option value="" disabled selected>Seleccione su categoría</option>

<option value="sensores">Sensores</option>
<option value="motores">Motores</option>
<option value="controladores">Controladores</option>
<option value="componentes">Componentes electrónicos</option>

</select>

<i class="fas fa-chevron-down select-arrow"></i>

</div>
</div>


<!-- PRODUCTOS -->
<div class="form-group">

<label>Piezas de la categoría</label>

<div class="input-wrapper">

<i class="fas fa-microchip input-icon"></i>

<select id="productos">

<option>Primero seleccione una categoría</option>

</select>

<i class="fas fa-chevron-down select-arrow"></i>

</div>

</div>


<!-- BOTON -->
        <button type="submit" class="btn-register">
            <a class="btn-text" href="/ASSETS/Ciudad.html">Registrarse</a>
            <i class="fas fa-arrow-right btn-icon"></i>
        </button>
        </form>
    </div>
</div>
</div>

<script src="/JS/categoria.js"></script>

</body>
</html>
