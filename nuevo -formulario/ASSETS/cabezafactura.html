<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MechaCore - Cabeza Factura</title>
    <link rel="stylesheet" href="/CSS/styles6.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css ">
</head>
<body>
    <div class="container">
        <!-- Panel Izquierdo -->
        <div class="left-panel">
            <div class="brand">
                <div class="logo">
                    <i class="fas fa-microchip"></i>
                </div>
                <h1 class="brand-name">MechaCore</h1>
                <p class="brand-tagline">Tu tienda virtual de tecnología mecánica</p>
            </div>

            <div class="hero-image">
                <img src="/img/Logo.jpg" alt="Robot mecánico">
            </div>

            <div class="features">
                <div class="feature-card">
                    <div class="feature-icon">
                        <i class="fas fa-robot"></i>
                    </div>
                    <span class="feature-text">Tecnología<br>Avanzada</span>
                </div>
                <div class="feature-card">
                    <div class="feature-icon">
                        <i class="fas fa-cog"></i>
                    </div>
                    <span class="feature-text">Componentes<br>Premium</span>
                </div>
                <div class="feature-card">
                    <div class="feature-icon">
                        <i class="fas fa-bolt"></i>
                    </div>
                    <span class="feature-text">Envío Rápido</span>
                </div>
            </div>
        </div>

        <!-- Panel Derecho -->
        <div class="right-panel">
            <div class="form-container">
                <h2 class="form-title">Formulario Cabeza factura</h2>
                <p class="form-subtitle">Únete a la revolución tecnológica</p>

        <form id="registrationForm">

        <div class="fg">
            <label for="name">Numero de Factura</label>
            <div class="input-wrapper">
                <span class="input-icon">
                    <i class="fas fa-file-invoice"></i>
                </span>
                <input type="text" id="numeroFactura" placeholder="Ingrese el número de factura">
            </div>
        </div>

        <div class="fg">
            <label for="email">Fecha venta</label>
            <div class="input-wrapper">
                <span class="input-icon">
                    <i class="fas fa-calendar"></i>
                </span>
                <input type="text" id="fechaVenta" placeholder="Ingrese la fecha de venta">
            </div>
        </div>

        <div class="fg">
            <label for="password">Total Factura</label>
            <div class="input-wrapper">
                <span class="input-icon">
                    <i class="fas fa-dollar-sign"></i>
                </span>
                <input type="number" id="total" placeholder="Ingrese el total de la factura">
            </div>
        </div>

                     <!-- Botón de registro -->
                    <button type="submit" class="btn-register">
                        <a class="btn-text" href="/ASSETS/CabezaPedido.html">Registrarse</a>
                        <i class="fas fa-arrow-right btn-icon"></i>
                        <div class="spinner hidden"></div>
                    </button>
                </form>

            </div>
        </div>
    </div>

    <!-- Toast de notificación -->
    <div id="toast" class="toast hidden">
        <i class="fas fa-check-circle toast-icon"></i>
    </div>

    <script src="/JS/cabezafactura.js"></script>
</body>
</html>
