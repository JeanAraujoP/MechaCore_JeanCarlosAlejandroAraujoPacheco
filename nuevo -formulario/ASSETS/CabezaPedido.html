<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MechaCore - Formulario Pedido</title>
    <link rel="stylesheet" href="/CSS/styles6.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css ">
</head>
<body>
    <div class="container">
        <!-- Panel Izquierdo -->
        <div class="left-panel">
            <div class="brand">
                <div class="logo">
                    <i class="fas fa-microchip"></i>
                </div>
                <h1 class="brand-name">MechaCore</h1>
                <p class="brand-tagline">Tu tienda virtual de tecnología mecánica</p>
            </div>

            <div class="hero-image">
                <img src="/img/Logo.jpg" alt="Robot mecánico">
            </div>

            <div class="features">
                <div class="feature-card">
                    <div class="feature-icon">
                        <i class="fas fa-robot"></i>
                    </div>
                    <span class="feature-text">Tecnología<br>Avanzada</span>
                </div>
                <div class="feature-card">
                    <div class="feature-icon">
                        <i class="fas fa-cog"></i>
                    </div>
                    <span class="feature-text">Componentes<br>Premium</span>
                </div>
                <div class="feature-card">
                    <div class="feature-icon">
                        <i class="fas fa-bolt"></i>
                    </div>
                    <span class="feature-text">Envío Rápido</span>
                </div>
            </div>
        </div>

        <!-- Panel Derecho -->
        <div class="right-panel">
            <div class="form-container">
                <h2 class="form-title">Formulario de Cabeza Pedido</h2>
                <p class="form-subtitle">Únete a la revolución tecnológica</p>

        <form id="registrationForm">

            <div class="fg">
                <label for="name">Numero pedido</label>
                <div class="input-wrapper">
                    <span class="input-icon">
                        <i class="fas fa-file-invoice"></i>
                    </span>
                    <input 
                        type="text" 
                        id="numeroPedido" 
                        name="numeroPedido" 
                        placeholder="ingrese su numero de pedido"
                        required
                    >
                </div>

                <div class="fg">
                    <label for="email">Fecha pedido</label>
                    <div class="input-wrapper">
                        <span class="input-icon">
                            <i class="fas fa-calendar"></i>
                        </span>
                        <input
                            type="date" 
                            id="fechaPedido" 
                            name="fechaPedido" 
                            placeholder="ingrese su fecha de pedido"
                            required
                        >
                    </div>
                
            <div class="fg">
                    <label>Fecha estimada pedido</label>
                    <div class="input-wrapper">
                        <span class="input-icon">
                            <i class="fas fa-calendar"></i>
                        </span>
                        <input
                            type="date" 
                            id="fechaEstimadaPedido" 
                            name="fechaEstimadaPedido" 
                            placeholder="ingrese su fecha estimada de pedido"
                            required
                        >
                    </div>

                    <div class="fg">
                        <label for="totalPedido">Total pedido</label>
                        <div class="input-wrapper">
                            <span class="input-icon">
                                <i class="fas fa-money-bill"></i>
                            </span>
                            <input
                                type="number"
                                id="totalPedido"
                                name="totalPedido"
                                placeholder="ingrese el total del pedido"
                                required
                            >
                        </div>
                    </div>


                    <!-- Términos y condiciones -->
                    <div class="form-group terms">
                        <label class="checkbox-wrapper">
                            <input type="checkbox" id="terms" name="terms" required>
                            <span class="checkmark"></span>
                            <span class="terms-text">
                                Acepto los <a href="#" class="terms-link">términos y condiciones</a>
                            </span>
                        </label>
                        <span class="error-message" id="termsError"></span>
                    </div>

                    <!-- Botón de registro -->
                    <button type="submit" class="btn-register">
                        <a class="btn-text" href="/ASSETS/Categoria.html">Registrarse</a>
                        <i class="fas fa-arrow-right btn-icon"></i>
                        <div class="spinner hidden"></div>
                    </button>
                </form>

                <p class="login-link">
                    ¿Ya tienes cuenta? <a href="#">Inicia sesión</a>
                </p>
            </div>
        </div>
    </div>

    <!-- Toast de notificación -->
    <div id="toast" class="toast hidden">
        <i class="fas fa-check-circle toast-icon"></i>
    </div>


    <script src="/JS/cabezapedido.js"></script>
</body>
</html>  
</body>
</html>
