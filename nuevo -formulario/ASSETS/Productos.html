<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MechaCore - Producto</title>
    <link rel="stylesheet" href="/CSS/styles6.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css ">
</head>
<body>
    <div class="container">
        <!-- Panel Izquierdo -->
        <div class="left-panel">
            <div class="brand">
                <div class="logo">
                    <i class="fas fa-microchip"></i>
                </div>
                <h1 class="brand-name">MechaCore</h1>
                <p class="brand-tagline">Tu tienda virtual de tecnología mecánica</p>
            </div>

            <div class="hero-image">
                <img src="/img/Logo.jpg" alt="Robot mecánico">
            </div>

            <div class="features">
                <div class="feature-card">
                    <div class="feature-icon">
                        <i class="fas fa-robot"></i>
                    </div>
                    <span class="feature-text">Tecnología<br>Avanzada</span>
                </div>
                <div class="feature-card">
                    <div class="feature-icon">
                        <i class="fas fa-cog"></i>
                    </div>
                    <span class="feature-text">Componentes<br>Premium</span>
                </div>
                <div class="feature-card">
                    <div class="feature-icon">
                        <i class="fas fa-bolt"></i>
                    </div>
                    <span class="feature-text">Envío Rápido</span>
                </div>
            </div>
        </div>

        <!-- Panel Derecho -->
        <div class="right-panel">
            <div class="form-container">
                <h2 class="form-title">Formulario Producto</h2>
                <p class="form-subtitle">Descubre nuestra última innovación</p>

                <form id="registerForm" novalidate>

                    <!-- Nombre completo -->
                    <div class="form-group">
                        <label for="fullname">Nombre</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user input-icon"></i>
                            <input 
                                type="text" 
                                id="fullname" 
                                name="fullname" 
                                placeholder="ingrese su nombre completo"
                                required
                            >
                        </div>
                        <span class="error-message" id="fullnameError"></span>
                    </div>

                <form id="registerForm" novalidate>
                    
                    <!-- Nombre completo -->
                    <div class="form-group">
                        <label for="fullname">descripcion</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user input-icon"></i>
                            <input 
                                type="text" 
                                id="fullname" 
                                name="fullname" 
                                placeholder="ingrese su nombre completo"
                                required
                            >
                        </div>
                        <span class="error-message" id="fullnameError"></span>
                    </div>

<!-- Productos más vendidos -->
<div class="form-group">
    <label for="DocumentTyper">Productos más vendidos</label>
    <div class="input-wrapper">
        <i class="fas fa-id-card input-icon"></i>

        <select id="DocumentTyper" onchange="mostrarPrecio()">
            <option value="" disabled selected>Seleccione su producto</option>
            <option value="proximidad">Sensores de proximidad</option>
            <option value="ultrasonicos">Sensores ultrasónicos</option>
            <option value="temperatura">Sensores de temperatura</option>
            <option value="presion">Sensores de presión</option>
            <option value="infrarrojos">Sensores de luz o infrarrojos</option>
            <option value="giroscopios">Acelerómetros y giroscopios</option>
        </select>

        <i class="fas fa-chevron-down select-arrow"></i>
    </div>
    <span class="error-message" id="documentTypeError"></span>
</div>

<!-- Precio -->
<div class="fg">
    <label>Precio</label>
    <div class="input-wrapper">
        <span class="input-icon">
            <i class="fa-solid fa-dollar-sign"></i>
        </span>
        <input type="text" id="precio" readonly placeholder="Ingrese el total de envío">
    </div>

                        <span class="error-message" id="termsError"></span>
                    </div>

                    <!-- Botón de registro -->
                    <button type="submit" class="btn-register">
                        <a class="btn-text" href="/ASSETS/rol.html">Registrarse</a>
                        <i class="fas fa-arrow-right btn-icon"></i>
                        <div class="spinner hidden"></div>
                    </button>
                </form>

                <p class="login-link">
                    ¿Ya tienes cuenta? <a href="#">Inicia sesión</a>
                </p>
            </div>
        </div>
    </div>

    <!-- Toast de notificación -->
    <div id="toast" class="toast hidden">
        <i class="fas fa-check-circle toast-icon"></i>
    </div>

    <script src="/JS/productos.js"></script>
</body>
</html>
