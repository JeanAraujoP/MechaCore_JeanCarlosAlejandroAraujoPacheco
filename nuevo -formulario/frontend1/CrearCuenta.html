<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MechaCore - Crear Cuenta</title>
    <link rel="stylesheet" href="styles1.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css ">
</head>
<body>
    <div class="container">
        <!-- Panel Izquierdo -->
        <div class="left-panel">
            <div class="brand">
                <div class="logo">
                    <i class="fas fa-microchip"></i>
                </div>
                <h1 class="brand-name">MechaCore</h1>
                <p class="brand-tagline">Tu tienda virtual de tecnología mecánica</p>
            </div>

            <div class="hero-image">
                <img src="img/Logo.jpg" alt="Robot mecánico">
            </div>

            <div class="features">
                <div class="feature-card">
                    <div class="feature-icon">
                        <i class="fas fa-robot"></i>
                    </div>
                    <span class="feature-text">Tecnología<br>Avanzada</span>
                </div>
                <div class="feature-card">
                    <div class="feature-icon">
                        <i class="fas fa-cog"></i>
                    </div>
                    <span class="feature-text">Componentes<br>Premium</span>
                </div>
                <div class="feature-card">
                    <div class="feature-icon">
                        <i class="fas fa-bolt"></i>
                    </div>
                    <span class="feature-text">Envío Rápido</span>
                </div>
            </div>
        </div>

        <!-- Panel Derecho -->
        <div class="right-panel">
            <div class="form-container">
                <h2 class="form-title">Crear Cuenta</h2>
                <p class="form-subtitle">Únete a la revolución tecnológica</p>

                <form id="registerForm" novalidate>
                    <!-- Nombre completo -->
                    <div class="form-group">
                        <label for="fullname">Nombre</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user input-icon"></i>
                            <input 
                                type="text" 
                                id="fullname" 
                                name="fullname" 
                                placeholder="ingrese su nombre completo"
                                required
                            >
                        </div>
                        <span class="error-message" id="fullnameError"></span>
                    </div>

                <form id="registerForm" novalidate>
                    
                    <!-- Nombre completo -->
                    <div class="form-group">
                        <label for="fullname">apellido</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user input-icon"></i>
                            <input 
                                type="text" 
                                id="fullname" 
                                name="fullname" 
                                placeholder="ingrese su nombre completo"
                                required
                            >
                        </div>
                        <span class="error-message" id="fullnameError"></span>
                    </div>

                    <!-- Tipo de documento - NUEVO -->
                    <div class="form-group">
                        <label for="documentType">Tipo de documento</label>
                        <div class="input-wrapper">
                            <i class="fas fa-id-card input-icon"></i>
                            <select id="documentType" name="documentType" required>
                                <option value="" disabled selected>Seleccione tipo de documento</option>
                                <option value="cedula">Cédula</option>
                                <option value="ti">Tarjeta de Identidad</option>
                                <option value="ppt">Permiso por Protección Temporal</option>
                                <option value="ce">Cédula de Extranjería</option>
                                <option value="pep">Permiso Especial de Permanencia</option>
                                <option value="nit">Número de Identificación Tributaria</option>
                            </select>
                            <i class="fas fa-chevron-down select-arrow"></i>
                        </div>
                        <span class="error-message" id="documentTypeError"></span>
                    </div>

                    <!-- Número de documento - NUEVO -->
                    <div class="form-group">
                        <label for="documentNumber">Número de documento</label>
                        <div class="input-wrapper">
                            <i class="fas fa-hashtag input-icon"></i>
                            <input 
                                type="text" 
                                id="documentNumber" 
                                name="documentNumber" 
                                placeholder="Ingrese su número de documento"
                                required
                            >
                        </div>
                        <span class="error-message" id="documentNumberError"></span>
                    </div>

                    <!-- Correo electrónico -->
                    <div class="form-group">
                        <label for="email">Correo electrónico</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope input-icon"></i>
                            <input 
                                type="email" 
                                id="email" 
                                name="email" 
                                placeholder="ingrese su correo electrónico"
                                required
                            >
                        </div>
                        <span class="error-message" id="emailError"></span>
                    </div>

                    <!-- Rol - NUEVO -->
                    <div class="form-group">
                        <label for="role">Rol</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user-tag input-icon"></i>
                            <select id="role" name="role" required>
                                <option value="" disabled selected>Seleccione su rol</option>
                                <option value="proveedor">Proveedor</option>
                                <option value="usuario">Usuario</option>
                            </select>
                            <i class="fas fa-chevron-down select-arrow"></i>
                        </div>
                        <span class="error-message" id="roleError"></span>
                    </div>

                    <!-- Contraseña -->
                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock input-icon"></i>
                            <input 
                                type="password" 
                                id="password" 
                                name="password" 
                                placeholder="••••••••"
                                required
                            >
                            <button type="button" class="toggle-password" data-target="password">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <span class="error-message" id="passwordError"></span>
                    </div>

                    <!-- Confirmar contraseña -->
                    <div class="form-group">
                        <label for="confirmPassword">Confirmar contraseña</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock input-icon"></i>
                            <input 
                                type="password" 
                                id="confirmPassword" 
                                name="confirmPassword" 
                                placeholder="••••••••"
                                required
                            >
                            <button type="button" class="toggle-password" data-target="confirmPassword">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <span class="error-message" id="confirmPasswordError"></span>
                    </div>

                    <!-- Términos y condiciones -->
                    <div class="form-group terms">
                        <label class="checkbox-wrapper">
                            <input type="checkbox" id="terms" name="terms" required>
                            <span class="checkmark"></span>
                            <span class="terms-text">
                                Acepto los <a href="#" class="terms-link">términos y condiciones</a>
                            </span>
                        </label>
                        <span class="error-message" id="termsError"></span>
                    </div>

                    <!-- Botón de registro -->
                    <button type="submit" class="btn-register" >
                        <a class="btn-text" href="../frontend2/FormularioUsuario.html">Registrarse</a>
                        <i class="fas fa-arrow-right btn-icon"></i>
                        <div class="spinner hidden"></div>
                    </button>
                </form>

                <p class="login-link">
                    ¿Ya tienes cuenta? <a href="#">Inicia sesión</a>
                </p>
            </div>
        </div>
    </div>

    <!-- Toast de notificación -->
    <div id="toast" class="toast hidden">
        <i class="fas fa-check-circle toast-icon"></i>
    </div>

    <script src="script.js"></script>
</body>
</html>
